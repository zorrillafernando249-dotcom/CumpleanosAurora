<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <title>Feliz Cumpleaños</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="mobile.css"
      media="only screen and (max-width: 768px)"
    />
  </head>
  <body>
    <!--Confeti Atras-->
    <canvas id="canvas1"></canvas>

    <div class="contenedor">
      <!-- PortaRetrato -->
      <div class="portaretrato-torta-caja">
        <div class="portaretrato">
          <div class="marco">
            <img src="/recursos/cumpleañera.png" alt="Foto" />
          </div>
          <div class="soporte-marco"></div>
        </div>

        <!--Torta De Cumpleaños-->
        <div class="torta-cumpleaños">
          <div class="torta">
            <div class="chocolate"></div>
          </div>
          <div class="vela"></div>
          <div class="llama"></div>
        </div>

        <!--Caja De Regalo-->
        <div class="caja-wrapper">
          <div class="caja">
            <div class="cinta-de-regalo">
              <div class="cinta-de-regalo-izquierda"></div>
              <div class="cinta-de-regalo-derecha"></div>
              <div class="cinta-de-regalo-centro"></div>
            </div>
            <div class="regalos">
              <div class="regalo-sombra"></div>
            </div>
            <div class="regalo"></div>
            <div class="icono-estrella estrella1"></div>
            <div class="icono-estrella estrella2"></div>
            <div class="icono-estrella estrella3"></div>
            <div class="icono-estrella estrella4"></div>
            <div class="icono-estrella estrella5"></div>
          </div>
        </div>

        <!--Mensaje Feliz Cumpleaños-->
        <div class="happy-birthday">Happy Birthday</div>
      </div>

      <!--Mesa-->
      <div class="soporte"></div>
    </div>

<!-- Carta Modal -->
<div class="modal-carta" id="modalCarta">
  <div class="contenido-carta">

    <div class="carta">

      <div class="contador-paginas">
        <span id="paginaActual">1</span> / 8
      </div>

      <img
        id="imagenCarta"
        class="imagen-carta"
        src="/recursos/flork/1.png"
        alt="Flork"
      />

      <h2 id="tituloCarta">
        Aurora ❤️
      </h2>

      <p id="textoCarta">
        Texto temporal
      </p>

      <div class="navegacion-carta">

        <button id="btnAnterior">
          ◀ Anterior
        </button>

        <button id="btnSiguiente">
          Siguiente ▶
        </button>

      </div>

    </div>

  </div>
</div>

    <!--Confeti Delante-->
    <canvas id="canvas2"></canvas>

    <!--Todo Oscuro-->
    <audio id="soplido" src="/soplar1.mp3" preload="auto"></audio>
    <audio
      id="cancion"
      src="recursos/cancion.mp3"
      preload="auto"
    ></audio>
    <div class="overlay"></div>

    <script src="Confeti.js"></script>
    <script src="Confeti2.js"></script>
    <script src="Sorpresa.js"></script>
  </body>
</html>
